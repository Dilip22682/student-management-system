
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>

    <!-- ✅ Bootstrap 5 (single CDN only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f5f7fa;">

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
  <div class="container">

    <a class="navbar-brand fw-bold" href="{% url 'list' %}">
        Student Manager
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Left Menu -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'list' %}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'form' %}">Add Student</a>
        </li>
      </ul>

      <!-- 🔍 Search -->
      <form class="d-flex me-3" action="{% url 'searchdata' %}" method="post">
        {% csrf_token %}
        <input class="form-control me-2" type="search" name="q" placeholder="Search students">
        <button class="btn btn-success" type="submit">Search</button>
      </form>

      <!-- 🔐 Auth Section -->
      <ul class="navbar-nav">

        {% if user.is_authenticated %}
            <li class="nav-item">
                <span class="navbar-text text-white me-3">
                    👋 Hello, {{ user.username }}
                </span>
            </li>

            <li class="nav-item">
                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">
                    Logout
                </a>
            </li>

        {% else %}
            <li class="nav-item me-2">
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                    Login
                </a>
            </li>

            <li class="nav-item">
                <a class="btn btn-warning btn-sm" href="{% url 'register' %}">
                    Register
                </a>
            </li>
        {% endif %}

      </ul>

    </div>
  </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
